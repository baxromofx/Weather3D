<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather 3D</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="particles"></div>

<div class="card">

<div class="icon" id="weatherIcon">☀️</div>
  
<h1>Weather 3D</h1>

<div class="temp" id="temp">--°C</div>

<h2 id="city">Мой город</h2>

<p id="weather">Ожидание погоды...</p>

<div class="time" id="time"></div>

<div class="buttons">

<button id="refresh">
🔄 Обновить
</button>

<button id="forecast">
📅 Прогноз
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
