<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather 3D Pro</title>

<link rel="stylesheet" href="style.css">

<!-- Three.js (3D фон) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

</head>

<body>

<!-- 3D фон -->
<div id="scene"></div>

<!-- Основная карточка -->
<div class="card">

    <div id="icon">☀️</div>

    <h1>Weather 3D</h1>

    <div class="temp" id="temp">--°C</div>

    <div class="city" id="city">Загрузка...</div>

    <div class="desc" id="weather">Ожидание данных...</div>

    <div class="time" id="time"></div>

    <div class="info">
        <span id="wind">💨 --</span>
        <span id="hum">💧 --</span>
    </div>

    <div class="forecast">
        <h3>📅 Прогноз (скоро)</h3>
    </div>

    <button id="refresh">🔄 Обновить</button>

</div>

<script src="script.js"></script>

</body>
</html>
